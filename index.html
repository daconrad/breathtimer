<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breathe</title>
<style>
  :root {
    --ink: #20302c;
    --paper: #eaeee9;
    --mist: #d3dbd4;
    --inhale: #5b8c7b;   /* deep green */
    --hold:   #b8924f;   /* amber */
    --exhale: #6f93b8;   /* slate blue */
    --faint:  #aeb8b0;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: Georgia, 'Times New Roman', serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    overflow: hidden;
  }
  .app { text-align: center; max-width: 460px; width: 100%; }

  h1 {
    font-size: 1rem; font-weight: normal;
    letter-spacing: 0.4em; text-transform: uppercase;
    margin-bottom: 28px;
  }

  /* Exercise picker */
  .picker {
    display: flex; gap: 8px; justify-content: center;
    margin-bottom: 36px; flex-wrap: wrap;
  }
  .picker button {
    font-family: inherit; font-size: 0.72rem;
    letter-spacing: 0.12em; text-transform: uppercase;
    background: none; color: #5d6b64;
    border: 1px solid var(--faint); border-radius: 999px;
    padding: 8px 16px; cursor: pointer;
    transition: all 0.2s;
  }
  .picker button:hover { border-color: var(--ink); color: var(--ink); }
  .picker button.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .picker button:focus-visible { outline: 3px solid var(--hold); outline-offset: 2px; }

  .desc {
    font-size: 0.85rem;
    color: #5d6b64; min-height: 4.6em; margin-bottom: 28px;
    line-height: 1.5;
  }
  .desc .headline {
    display: block;
    font-style: normal;
    font-size: 0.78rem; letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--ink); margin-bottom: 6px;
  }
  .desc .body { font-style: italic; }

  /* Breathing stage */
  .stage {
    position: relative;
    width: 260px; height: 260px;
    margin: 0 auto 8px;
    display: flex; align-items: center; justify-content: center;
  }
  .orb {
    position: absolute;
    width: 120px; height: 120px;
    border-radius: 50%;
    background: var(--inhale);
    opacity: 0.18;
    transform: scale(1);
    transition: none;
  }
  .ring {
    position: absolute;
    width: 120px; height: 120px;
    border-radius: 50%;
    border: 1.5px solid var(--inhale);
    transform: scale(1);
    transition: none;
  }
  .center {
    position: relative; z-index: 2;
    display: flex; flex-direction: column; align-items: center;
  }
  .phase {
    font-size: 1.2rem; letter-spacing: 0.3em;
    text-transform: uppercase; color: var(--ink);
    min-height: 1.4em;
  }
  .secs {
    font-size: 2.6rem; line-height: 1;
    font-variant-numeric: tabular-nums; margin-top: 6px;
    color: #5d6b64;
  }

  .cyclecount {
    font-size: 0.78rem; letter-spacing: 0.2em;
    text-transform: uppercase; color: #5d6b64;
    min-height: 1.2em; margin-bottom: 28px;
  }

  .controls { display: flex; gap: 12px; justify-content: center; }
  .controls button {
    font-family: inherit; font-size: 0.85rem;
    letter-spacing: 0.25em; text-transform: uppercase;
    background: none; color: var(--ink);
    border: 1.5px solid var(--ink); border-radius: 999px;
    padding: 12px 34px; cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }
  .controls button:hover { background: var(--ink); color: var(--paper); }
  .controls button:focus-visible { outline: 3px solid var(--hold); outline-offset: 3px; }

  .sound-row {
    margin-top: 22px;
    display: flex; justify-content: center;
  }
  .sound-btn {
    width: 44px; height: 44px;
    display: flex; align-items: center; justify-content: center;
    background: none; color: #5d6b64;
    border: 1px solid var(--faint); border-radius: 50%;
    cursor: pointer; padding: 0;
    transition: color 0.2s, border-color 0.2s, background 0.2s;
  }
  .sound-btn:hover { color: var(--ink); border-color: var(--ink); }
  .sound-btn:focus-visible { outline: 3px solid var(--hold); outline-offset: 3px; }
  .sound-btn.off { color: var(--faint); }
  .sound-btn svg { width: 22px; height: 22px; display: block; }
  .sound-btn .wave { transition: opacity 0.2s; }
  .sound-btn.off .wave { opacity: 0; }
  .sound-btn .slash { opacity: 0; transition: opacity 0.2s; }
  .sound-btn.off .slash { opacity: 1; }

  @media (prefers-reduced-motion: reduce) {
    .orb, .ring { transition: none !important; }
  }
</style>
</head>
<body>
<div class="app">
  <h1>Breathe</h1>

  <div class="picker" id="picker"></div>
  <div class="desc" id="desc"></div>

  <div class="stage">
    <div class="orb" id="orb"></div>
    <div class="ring" id="ring"></div>
    <div class="center">
      <div class="phase" id="phase">Ready</div>
      <div class="secs" id="secs"></div>
    </div>
  </div>

  <div class="cyclecount" id="cyclecount"></div>

  <div class="controls">
    <button id="startBtn">Begin</button>
    <button id="resetBtn" style="display:none">Reset</button>
  </div>

  <div class="sound-row">
    <button class="sound-btn" id="soundBtn" aria-pressed="true" aria-label="Mute chime" title="Sound on">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 9v6h4l5 4V5L8 9H4z" fill="currentColor" stroke="none"></path>
        <path class="wave" d="M16 9a4 4 0 0 1 0 6"></path>
        <path class="wave" d="M18.5 6.5a8 8 0 0 1 0 11"></path>
        <line class="slash" x1="3" y1="3" x2="21" y2="21"></line>
      </svg>
    </button>
  </div>
</div>

<script>
(function () {
  // ---- Exercise definitions ----
  // Each phase: { name, secs, kind }  kind in {inhale, hold, exhale}
  const EXERCISES = {
    coherent: {
      label: 'Coherent 5–5',
      headline: 'Calm and balance',
      desc: 'Slows you to about six breaths a minute, the pace that nudges heart and nervous system into balance. A steadying daily reset for stress or focus.',
      cycles: 12,
      phases: [
        { name: 'Inhale', secs: 5, kind: 'inhale' },
        { name: 'Exhale', secs: 5, kind: 'exhale' },
      ],
    },
    box: {
      label: 'Box 4–4–4–4',
      headline: 'Focus under pressure',
      desc: 'The even four-count rhythm with holds quiets a racing mind and steadies nerves. Reach for it before something stressful or to regain composure.',
      cycles: 10,
      phases: [
        { name: 'Inhale', secs: 4, kind: 'inhale' },
        { name: 'Hold',   secs: 4, kind: 'hold' },
        { name: 'Exhale', secs: 4, kind: 'exhale' },
        { name: 'Hold',   secs: 4, kind: 'hold' },
      ],
    },
    relax: {
      label: '4–7–8',
      headline: 'Wind down to sleep',
      desc: 'The long, slow exhale tips the body toward rest and eases tension. Best for unwinding at night or settling anxiety before sleep.',
      cycles: 8,
      phases: [
        { name: 'Inhale', secs: 4, kind: 'inhale' },
        { name: 'Hold',   secs: 7, kind: 'hold' },
        { name: 'Exhale', secs: 8, kind: 'exhale' },
      ],
    },
  };

  const COLORS = {
    inhale: getComputedStyle(document.documentElement).getPropertyValue('--inhale').trim(),
    hold:   getComputedStyle(document.documentElement).getPropertyValue('--hold').trim(),
    exhale: getComputedStyle(document.documentElement).getPropertyValue('--exhale').trim(),
  };
  // tones per phase kind (Hz)
  const TONES = { inhale: 294, hold: 392, exhale: 220 };

  // ---- State ----
  let current = 'coherent';
  let running = false;
  let ctx = null;
  let rafId = null;
  let phaseIdx = 0;
  let cycle = 0;
  let phaseStart = 0;       // performance.now() at phase start
  let lastWhole = -1;       // last whole second shown

  // ---- Elements ----
  const picker = document.getElementById('picker');
  const descEl = document.getElementById('desc');

  function renderDesc(key) {
    const ex = EXERCISES[key];
    const h = document.createElement('span');
    h.className = 'headline';
    h.textContent = ex.headline;
    const b = document.createElement('span');
    b.className = 'body';
    b.textContent = ex.desc;
    descEl.replaceChildren(h, b);
  }
  const orb = document.getElementById('orb');
  const ring = document.getElementById('ring');
  const phaseEl = document.getElementById('phase');
  const secsEl = document.getElementById('secs');
  const cycleEl = document.getElementById('cyclecount');
  const startBtn = document.getElementById('startBtn');
  const resetBtn = document.getElementById('resetBtn');
  const soundBtn = document.getElementById('soundBtn');
  let soundOn = true;

  soundBtn.addEventListener('click', () => {
    soundOn = !soundOn;
    soundBtn.classList.toggle('off', !soundOn);
    soundBtn.setAttribute('aria-pressed', String(soundOn));
    soundBtn.setAttribute('aria-label', soundOn ? 'Mute chime' : 'Unmute chime');
    soundBtn.setAttribute('title', soundOn ? 'Sound on' : 'Sound off');
  });

  // Build picker buttons
  Object.keys(EXERCISES).forEach(key => {
    const b = document.createElement('button');
    b.textContent = EXERCISES[key].label;
    b.dataset.key = key;
    if (key === current) b.classList.add('active');
    b.addEventListener('click', () => selectExercise(key));
    picker.appendChild(b);
  });

  function selectExercise(key) {
    if (running) reset();
    current = key;
    [...picker.children].forEach(b =>
      b.classList.toggle('active', b.dataset.key === key));
    renderDesc(key);
    resetVisual();
  }

  function resetVisual() {
    phaseEl.textContent = 'Ready';
    secsEl.textContent = '';
    cycleEl.textContent = '';
    setOrb('inhale', 1, 0); // small, no transition
  }

  // scale the orb/ring. kind picks color; targetScale is final size; durMs is the CSS transition time.
  function setOrb(kind, targetScale, durMs) {
    const color = COLORS[kind];
    const trans = durMs > 0 ? `transform ${durMs}ms linear` : 'none';
    orb.style.transition = trans;
    ring.style.transition = trans;
    orb.style.background = color;
    ring.style.borderColor = color;
    // force reflow so a change from 'none' to a transition takes effect cleanly
    void orb.offsetWidth;
    orb.style.transform = `scale(${targetScale})`;
    ring.style.transform = `scale(${targetScale})`;
  }

  // ---- Audio: gentle bell ----
  function chime(freq) {
    if (!ctx || !soundOn) return;
    const now = ctx.currentTime;
    const dur = 1.8;
    const master = ctx.createGain();
    master.gain.setValueAtTime(0.0001, now);
    master.gain.exponentialRampToValueAtTime(0.22, now + 0.02);
    master.gain.exponentialRampToValueAtTime(0.0001, now + dur);
    master.connect(ctx.destination);

    const o1 = ctx.createOscillator();
    o1.type = 'sine'; o1.frequency.value = freq; o1.connect(master);
    const pg = ctx.createGain(); pg.gain.value = 0.16; pg.connect(master);
    const o2 = ctx.createOscillator();
    o2.type = 'sine'; o2.frequency.value = freq * 2.76; o2.connect(pg);
    o1.start(now); o2.start(now);
    o1.stop(now + dur); o2.stop(now + dur);
  }

  // ---- Phase engine ----
  function beginPhase() {
    const ex = EXERCISES[current];
    const phase = ex.phases[phaseIdx];
    phaseStart = performance.now();
    lastWhole = -1;

    phaseEl.textContent = phase.name;
    phaseEl.style.color = COLORS[phase.kind];
    chime(TONES[phase.kind]);

    // Drive the orb. Inhale grows, exhale shrinks, hold stays.
    const SMALL = 1, BIG = 1.9;
    if (phase.kind === 'inhale') setOrb('inhale', BIG, phase.secs * 1000);
    else if (phase.kind === 'exhale') setOrb('exhale', SMALL, phase.secs * 1000);
    else setOrb('hold', currentScale(), 0); // hold: freeze at current size, recolor
  }

  // read the current visual scale from inline style (defaults to 1)
  function currentScale() {
    const m = /scale\(([\d.]+)\)/.exec(orb.style.transform);
    return m ? parseFloat(m[1]) : 1;
  }

  function tick(nowTs) {
    if (!running) return;
    const ex = EXERCISES[current];
    const phase = ex.phases[phaseIdx];
    const elapsed = (nowTs - phaseStart) / 1000;
    const remaining = Math.max(0, phase.secs - elapsed);

    const shown = Math.ceil(remaining);
    if (shown !== lastWhole) { secsEl.textContent = shown; lastWhole = shown; }

    if (elapsed >= phase.secs) {
      // advance
      phaseIdx++;
      if (phaseIdx >= ex.phases.length) {
        phaseIdx = 0;
        cycle++;
        if (cycle >= ex.cycles) { finish(); return; }
      }
      cycleEl.textContent = `Cycle ${cycle + 1} of ${ex.cycles}`;
      beginPhase();
    }
    rafId = requestAnimationFrame(tick);
  }

  function start() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    ctx.resume();
    running = true;
    phaseIdx = 0; cycle = 0;
    startBtn.textContent = 'Pause';
    resetBtn.style.display = '';
    cycleEl.textContent = `Cycle 1 of ${EXERCISES[current].cycles}`;
    beginPhase();
    rafId = requestAnimationFrame(tick);
  }

  function pause() {
    running = false;
    cancelAnimationFrame(rafId);
    startBtn.textContent = 'Resume';
    // freeze orb where it is
    setOrb(EXERCISES[current].phases[phaseIdx].kind, currentScale(), 0);
  }

  function resume() {
    running = true;
    startBtn.textContent = 'Pause';
    // restart the current phase cleanly from its beginning for simplicity
    beginPhase();
    rafId = requestAnimationFrame(tick);
  }

  function finish() {
    running = false;
    cancelAnimationFrame(rafId);
    phaseEl.textContent = 'Complete';
    phaseEl.style.color = COLORS.inhale;
    secsEl.textContent = '';
    cycleEl.textContent = `${EXERCISES[current].cycles} cycles done`;
    setOrb('inhale', 1, 1200);
    startBtn.textContent = 'Begin';
    startBtn.dataset.finished = '1';
  }

  function reset() {
    running = false;
    cancelAnimationFrame(rafId);
    phaseIdx = 0; cycle = 0;
    startBtn.textContent = 'Begin';
    delete startBtn.dataset.finished;
    resetBtn.style.display = 'none';
    resetVisual();
  }

  startBtn.addEventListener('click', () => {
    if (startBtn.dataset.finished) { delete startBtn.dataset.finished; start(); return; }
    if (!running && startBtn.textContent === 'Resume') resume();
    else if (running) pause();
    else start();
  });
  resetBtn.addEventListener('click', reset);

  // init
  renderDesc(current);
  resetVisual();
})();
</script>
</body>
</html>
